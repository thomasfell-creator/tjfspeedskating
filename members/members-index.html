<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Member Dashboard | TJF Speed Skating</title>

    <link rel="stylesheet" href="../styles.css">

    <style>

        main {

            max-width: 1000px;

            margin: 40px auto;

            padding: 20px;

        }

        .dashboard-grid {

            display: grid;

            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));

            gap: 20px;

            margin-top: 30px;

        }

        .card {

            border: 1px solid #ddd;

            border-radius: 10px;

            padding: 20px;

            text-decoration: none;

            color: inherit;

            transition: 0.2s;

        }

        .card:hover {

            transform: translateY(-3px);

        }

        .logout-btn {

            padding: 10px 20px;

            cursor: pointer;

        }

    </style>

</head>

<body>

<header>

    <img src="../images/logo.png" alt="TJF Speed Skating Logo" class="logo">

    <nav>

        <a href="../index.html">Home</a>

        <a href="../contact.html">Contact</a>

        <a href="#" onclick="logout()">Logout</a>

    </nav>

</header>

<main>

    <h1>Member Dashboard</h1>

    <p id="welcome-message">

        Loading...

    </p>

    <div class="dashboard-grid">

        <a href="speed-skating-101.html" class="card">

            <h2>Speed Skating 101</h2>

            <p>Technical articles, training plans and athlete guides.</p>

        </a>

        <a href="profile.html" class="card">

            <h2>My Profile</h2>

            <p>Manage your account information.</p>

        </a>

    </div>

</main>

<!-- Supabase -->

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="../js/supabase.js"></script>

<script>

async function checkAuth() {

    const {

        data: { session }

    } = await supabase.auth.getSession();

    if (!session) {

        window.location.href = "../login.html";

        return;

    }

    document.getElementById("welcome-message").innerHTML =

        `Welcome, <strong>${session.user.email}</strong>`;

}

async function logout() {

    await supabase.auth.signOut();

    window.location.href = "../login.html";

}

checkAuth();

</script>

</body>

</html>
