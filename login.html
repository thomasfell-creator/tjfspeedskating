<h1>Member Login</h1>

<input

id="email"

type="email"

placeholder="Email">

<input

id="password"

type="password"

placeholder="Password">

<button onclick="login()">

Login

</button>

<script>

async function login() {

  const email =

    document.getElementById("email").value;

  const password =

    document.getElementById("password").value;

  const { error } =

    await supabase.auth.signInWithPassword({

      email,

      password

    });

  if (error) {

    alert(error.message);

    return;

  }

  window.location.href =

    "/members/";

}

</script>
